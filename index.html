<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="쿠팡 파트너스 감성 추천템 허브 - 오늘 이것만 있어도 꽤 괜찮은 하루" />
  <meta name="keywords" content="쿠팡, 추천템, 파트너스, 쇼핑, 감성, 테이블, justpicked, cozycart" />
  <meta property="og:title" content="오늘 이것만 있어도 꽤 괜찮은 하루" />
  <meta property="og:description" content="감성 담은 쿠팡 추천 아이템 허브 ✨ 매일 업데이트 되는 추천템 셀렉션" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://devaaronjeong.github.io/justpicked" />
  <meta property="og:image" content="https://yourdomain.com/thumbnail.jpg" />
  <title>✨ 오늘 이것만 있어도 꽤 괜찮은 하루 ✨</title>
  <style>
    body {
      font-family: 'Apple SD Gothic Neo', 'Pretendard', sans-serif;
      background-color: #fffaf5;
      margin: 0;
      padding: 0;
      color: #4b2e2e;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 999;
      background-color: #fff4f4;
      border-bottom: 1px solid #f0dede;
      padding: 10px 0;
    }

    .marquee {
      width: 100%;
      overflow: hidden;
      white-space: nowrap;
      box-sizing: border-box;
      padding: 8px 0;
      background: #ffe7ec;
      color: #a14657;
      font-size: 13px;
    }

    .marquee span {
      display: inline-block;
      padding-left: 100%;
      animation: marquee 20s linear infinite;
    }

    @keyframes marquee {
      0% { transform: translate(0, 0); }
      100% { transform: translate(-100%, 0); }
    }

    h1 {
      text-align: center;
      font-size: 24px;
      margin: 24px auto;
    }

    #category-nav {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    #category-nav button {
      background-color: #ffeef0;
      color: #b1505e;
      border: none;
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
    }

    #category-nav button:hover {
      background-color: #ffc8d2;
    }

    
    .iframe-wrapper {
      max-width: 960px;
      margin: 0 auto;
    }
    
    iframe {
      width: 100vw;
      max-width: 100%;
      border: none;
      background-color: transparent;
      display: block;
      margin: 0 auto 80px;
    }

    footer {
      text-align: center;
      margin: 40px auto;
      font-size: 13px;
      color: #888;
    }
  </style>
</head>
<body>
  <header>
    <div class="marquee">
      <span>✨ 이 게시물은 쿠팡 파트너스 활동의 일환으로 일정액의 수수료를 제공받습니다. (추가 비용 없음)</span>
    </div>
  </header>

  <main>
    <h1>✨ 오늘 이것만 있어도 꽤 괜찮은 하루 ✨</h1>

    <div id="daily-message" style="text-align: center; font-size: 16px; margin-top: -10px; margin-bottom: 30px; color: #5f3d47;"></div>

    <nav id="category-nav"></nav>


    <!-- iframe 삽입 -->
    <div class="iframe-wrapper">
    <iframe
      id="item-table"
      src="https://script.google.com/macros/s/AKfycbw3Uvy3qhH2G2B1X9JXkbZxs7K98WQh3X_Ubge7kN4M_GjlXeQsZ0GYaPCHW_faSs1X8w/exec"
      scrolling="no"
      allow="clipboard-write"
      allowfullscreen
      referrerpolicy="no-referrer"
      style="width: 100%; max-width: 970px; border: none; display: block; margin: 0 auto;"
    ></iframe>
    </div>
  </main>

  <footer>
    © 2025 JustPicked | Powered by Coupang Partners
  </footer>
  <script>
    window.addEventListener("message", function (event) {
      const trusted = ["script.googleusercontent.com", "script.google.com"];
      if (!trusted.some(origin => event.origin.includes(origin))) return;
  
      const iframe = document.getElementById("item-table");
  
      if (typeof event.data === "object") {
        if (event.data.height) {
          iframe.style.height = event.data.height + "px";
        }
  
        if (event.data.type === "categoryList") {
          const nav = document.getElementById("category-nav");
          nav.innerHTML = "";
  
          const allBtn = document.createElement("button");
          allBtn.textContent = "전체보기";
          allBtn.onclick = () => {
            iframe.contentWindow.postMessage({ category: "all" }, "*");
          };
          nav.appendChild(allBtn);
  
          event.data.categories.forEach(cat => {
            const btn = document.createElement("button");
            btn.textContent = cat;
            btn.onclick = () => {
              iframe.contentWindow.postMessage({ category: cat }, "*");
            };
            nav.appendChild(btn);
          });
        }
      }
    });

    const iframe = document.getElementById("item-table");
    
    // iframe 메시지 수신 처리
    window.addEventListener("message", function (event) {
      const trustedOrigins = [
        "https://script.googleusercontent.com",
        "https://script.google.com"
      ];
    
      if (!trustedOrigins.includes(event.origin)) return;
    
      // 🔁 높이 조정
      if (event.data.height) {
        iframe.style.height = event.data.height + "px";
      }
    
      // 🔁 카테고리 목록 수신
      if (event.data.categories && Array.isArray(event.data.categories)) {
        const nav = document.getElementById("category-nav");
        nav.innerHTML = ""; // 기존 버튼 제거
    
        // ✅ 전체보기 버튼
        const allBtn = document.createElement("button");
        allBtn.textContent = "✨ 전체보기";
        allBtn.onclick = () => postCategoryToIframe("all");
        nav.appendChild(allBtn);
    
        // ✅ 카테고리별 버튼 생성
        event.data.categories.forEach(cat => {
          const btn = document.createElement("button");
          btn.textContent = ${categoryToEmoji(cat)} ${categoryToLabel(cat)};
          btn.onclick = () => postCategoryToIframe(cat);
          nav.appendChild(btn);
        });
      }
    });
    
    // ✅ iframe으로 카테고리 전송
    function postCategoryToIframe(category) {
      iframe.contentWindow.postMessage({ category }, "*");
    }
    
    // ✅ 감성 이름 변환 (필요 시 수정)
    function categoryToLabel(key) {
      const labels = {
        fruit: "과일",
        snack: "간식",
        kitchen: "주방용품",
        protein: "단백질",
        drink: "음료"
      };
      return labels[key] || key;
    }
    
    // ✅ 이모지 변환
    function categoryToEmoji(key) {
      const emojis = {
        fruit: "🍎",
        snack: "🍪",
        kitchen: "🧼",
        protein: "💪",
        drink: "🥤"
      };
      return emojis[key] || "🛒";
    }
    </script>

</body>
</html>
